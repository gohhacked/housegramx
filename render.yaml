services:
  - type: web
    name: housegramx
    env: node
    region: oregon
    plan: free
    
    buildCommand: |
      npm ci --prefer-offline --no-audit --legacy-peer-deps && \
      NODE_ENV=production npx webpack --mode production --no-stats
    
    startCommand: npx serve -s dist -l 10000 -n
    
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: --max-old-space-size=4096
      - key: NPM_CONFIG_PRODUCTION
        value: "true"
      - key: NPM_CONFIG_LOGLEVEL
        value: error
      - key: CI
        value: "true"
    
    autoDeploy: true
    
    healthCheckPath: /
